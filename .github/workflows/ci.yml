name: CI

on:
  push:
    branches:
      - "**"       # all branches
    tags-ignore:
      - "v*"
      - "*.*.*"   # ignore version tags; publish workflow handles those
  pull_request:
    branches:
      - "**"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest

      - name: Lint Python with Black
        run: |
          black --check .

      - name: Run Python tests
        run: |
          pytest

      - name: Lint jokes CSV/TSV
        run: |
          python scripts/lint_jokes.py

      # --- Optional JS/CSS/MD/HTML lint (informational, non-fatal) ---
      - name: Set up Node (for JS/CSS/MD/HTML lint)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
        continue-on-error: true

      - name: Install npm dependencies
        run: |
          npm install
        continue-on-error: true

      - name: Lint JavaScript
        run: |
          npm run lint:js
        continue-on-error: true

      - name: Lint CSS
        run: |
          npm run lint:css
        continue-on-error: true

      - name: Lint Markdown
        run: |
          npm run lint:md
        continue-on-error: true

      - name: Lint HTML
        run: |
          npm run lint:html
        continue-on-error: true