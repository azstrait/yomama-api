name: GitHub Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag to create a release for (e.g. 1.2.3 or v1.2.3)"
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version and tag
        id: vars
        run: |
          RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"      # strip leading v if present
          TAG="v${VERSION}"

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short "${TAG}")"

          echo "raw_input=${RAW}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine previous tag
        id: prev
        run: |
          CURRENT_TAG="${{ steps.vars.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${{ steps.vars.outputs.tag }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          echo "Generating changelog for range:"
          if [ -n "$PREV_TAG" ]; then
            echo "  $PREV_TAG..$CURRENT_TAG"
            RANGE="$PREV_TAG..$CURRENT_TAG"
          else
            echo "  (initial release) up to $CURRENT_TAG"
            RANGE="$CURRENT_TAG"
          fi

          git log --format="%h||%s" $RANGE > commits.txt || true

          FEAT_SECTION=""
          FIX_SECTION=""
          CHORE_SECTION=""
          DOCS_SECTION=""
          OTHER_SECTION=""

          while IFS='||' read -r hash subject; do
            [ -z "$subject" ] && continue
            line="[\`$hash\`](https://github.com/${GITHUB_REPOSITORY}/commit/$hash): $subject"
            case "$subject" in
              "feat:"*|"feat("*)
                FEAT_SECTION="${FEAT_SECTION}- ${line}\n"
                ;;
              "fix:"*|"fix("*)
                FIX_SECTION="${FIX_SECTION}- ${line}\n"
                ;;
              "chore:"*|"chore("*)
                CHORE_SECTION="${CHORE_SECTION}- ${line}\n"
                ;;
              "docs:"*|"docs("*)
                DOCS_SECTION="${DOCS_SECTION}- ${line}\n"
                ;;
              *)
                OTHER_SECTION="${OTHER_SECTION}- ${line}\n"
                ;;
            esac
          done < commits.txt

          CHANGELOG=""

          if [ -n "$FEAT_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🚀 Features\n${FEAT_SECTION}\n"
          fi
          if [ -n "$FIX_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIX_SECTION}\n"
          fi
          if [ -n "$CHORE_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🧹 Chores & Maintenance\n${CHORE_SECTION}\n"
          fi
          if [ -n "$DOCS_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📝 Documentation\n${DOCS_SECTION}\n"
          fi
          if [ -z "$CHANGELOG" ] && [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          elif [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="(No commits found for this range.)"
          fi

          CHANGELOG_ESCAPED=$(printf "%s" "$CHANGELOG" | sed 's/\\/\\\\/g')

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "$CHANGELOG_ESCAPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release body
        id: body
        run: |
          RAW_TAG="${{ steps.vars.outputs.raw_tag }}"
          VERSION="${{ steps.vars.outputs.version }}"
          MAJOR="${{ steps.vars.outputs.major }}"
          MINOR="${{ steps.vars.outputs.minor }}"
          PATCH="${{ steps.vars.outputs.patch }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          cat << 'EOF' > RELEASE_BODY.md
          A new version of **yomama-api** is out! 🎉

          ## Changelog

          CHANGELOG_PLACEHOLDER

          ## Docker Tags

          The following Docker tags are available for this release:

          - `ghcr.io/azstrait/yomama-api:vMAJOR`
          - `ghcr.io/azstrait/yomama-api:vMINOR`
          - `ghcr.io/azstrait/yomama-api:vPATCH`
          - `ghcr.io/azstrait/yomama-api:latest`
          - `ghcr.io/azstrait/yomama-api:build-SHORT_SHA`

          See all images at:
          https://github.com/azstrait/yomama-api/pkgs/container/yomama-api

          ## Usage

          See the [README](https://github.com/azstrait/yomama-api/blob/vVERSION/README.md#running-via-docker) for Docker usage:
          EOF

          # Replace placeholders for version info
          sed -i "s/vMAJOR/v${MAJOR}/g" RELEASE_BODY.md
          sed -i "s/vMINOR/v${MINOR}/g" RELEASE_BODY.md
          sed -i "s/vPATCH/v${PATCH}/g" RELEASE_BODY.md
          sed -i "s/SHORT_SHA/${SHORT_SHA}/g" RELEASE_BODY.md
          sed -i "s/vVERSION/v${VERSION}/g" RELEASE_BODY.md

          # Insert changelog content from the GitHub Actions output directly.
          # Use a here-doc to safely pass multi-line content into perl.
          perl -0pi -e "s/CHANGELOG_PLACEHOLDER/$(printf '%s' '${{ steps.changelog.outputs.changelog }}' | sed 's/[&/]/\\&/g')/" RELEASE_BODY.md

          echo "body_path=RELEASE_BODY.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: yomama-api v${{ steps.vars.outputs.version }}
          body_path: ${{ steps.body.outputs.body_path }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            docker-compose.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}