name: Docker Publish (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3 or v1.2.3)"
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # Run all lint/tests once before building images
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest

      - name: Lint Python with Black
        run: |
          black --check .

      - name: Run Python tests
        run: |
          pytest

      - name: Lint jokes CSV/TSV
        run: |
          python scripts/lint_jokes.py

      # --- Optional JS/CSS/MD/HTML lint (informational, non-fatal) ---
      - name: Set up Node (for JS/CSS/MD/HTML lint)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
        continue-on-error: true

      - name: Install npm dependencies
        run: |
          npm install
        continue-on-error: true

      - name: Lint JavaScript
        run: |
          npm run lint:js
        continue-on-error: true

      - name: Lint CSS
        run: |
          npm run lint:css
        continue-on-error: true

      - name: Lint Markdown
        run: |
          npm run lint:md
        continue-on-error: true

      - name: Lint HTML
        run: |
          npm run lint:html
        continue-on-error: true

  build-and-push:
    name: Build single-arch images
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version input
        id: vars
        run: |
          RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"        # strip leading v if present -> 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "raw_input=${RAW}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch_suffix }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.major }}-${{ matrix.arch_suffix }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.minor }}-${{ matrix.arch_suffix }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.patch }}-${{ matrix.arch_suffix }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  create-manifest:
    name: Build multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version input
        id: vars
        run: |
          RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"        # strip leading v if present -> 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          MAJOR="${{ steps.vars.outputs.major }}"
          MINOR="${{ steps.vars.outputs.minor }}"
          PATCH="${{ steps.vars.outputs.patch }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          # Arch-specific tags built by the matrix job
          BASE="${{ env.IMAGE_NAME }}:v${PATCH}"
          AMD_TAG="${BASE}-amd64"
          ARM_TAG="${BASE}-arm64"

          echo "Using arch images:"
          echo "  $AMD_TAG"
          echo "  $ARM_TAG"

          # Create combined multi-arch manifests for the main tags
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${MAJOR}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${MINOR}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${PATCH}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:latest" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:build-${SHORT_SHA}" "${AMD_TAG}" "${ARM_TAG}"