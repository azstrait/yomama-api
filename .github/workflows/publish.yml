name: Publish & Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # Run all lint/tests once before building images
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest

      - name: Lint Python with Black
        run: |
          black --check .

      - name: Run Python tests
        run: |
          pytest

      - name: Lint jokes CSV/TSV
        run: |
          python scripts/lint_jokes.py

      # --- Optional JS/CSS/MD/HTML lint (informational, non-fatal) ---
      - name: Set up Node (for JS/CSS/MD/HTML lint)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
        continue-on-error: true

      - name: Install npm dependencies
        run: |
          npm install
        continue-on-error: true

      - name: Lint JavaScript
        run: |
          npm run lint:js
        continue-on-error: true

      - name: Lint CSS
        run: |
          npm run lint:css
        continue-on-error: true

      - name: Lint Markdown
        run: |
          npm run lint:md
        continue-on-error: true

      - name: Lint HTML
        run: |
          npm run lint:html
        continue-on-error: true

  build-and-push:
    name: Build single-arch images
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract version info from tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3 or 1.2.3
          VERSION="${RAW_TAG#v}"                # strip leading v if present -> 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "raw_tag=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch_suffix }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.major }}-${{ matrix.arch_suffix }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.minor }}-${{ matrix.arch_suffix }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.patch }}-${{ matrix.arch_suffix }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  create-manifest:
    name: Build multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info from tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3 or 1.2.3
          VERSION="${RAW_TAG#v}"                # 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short "${RAW_TAG}")"

          echo "raw_tag=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          MAJOR="${{ steps.vars.outputs.major }}"
          MINOR="${{ steps.vars.outputs.minor }}"
          PATCH="${{ steps.vars.outputs.patch }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          # Arch-specific tags built by the matrix job
          BASE="${{ env.IMAGE_NAME }}:v${PATCH}"
          AMD_TAG="${BASE}-amd64"
          ARM_TAG="${BASE}-arm64"

          echo "Using arch images:"
          echo "  $AMD_TAG"
          echo "  $ARM_TAG"

          # Create combined multi-arch manifests for the main tags
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${MAJOR}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${MINOR}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:v${PATCH}" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:latest" "${AMD_TAG}" "${ARM_TAG}"
          docker buildx imagetools create -t "${{ env.IMAGE_NAME }}:build-${SHORT_SHA}" "${AMD_TAG}" "${ARM_TAG}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: create-manifest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info from tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3 or 1.2.3
          VERSION="${RAW_TAG#v}"                # 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short "${RAW_TAG}")"

          echo "raw_tag=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine previous tag
        id: prev
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          echo "Generating changelog for range:"
          if [ -n "$PREV_TAG" ]; then
            echo "  $PREV_TAG..$CURRENT_TAG"
            RANGE="$PREV_TAG..$CURRENT_TAG"
          else
            echo "  (initial release) up to $CURRENT_TAG"
            RANGE="$CURRENT_TAG"
          fi

          # hash + subject, separated by space
          git log --format="%h %s" $RANGE > commits.txt || true

          FEAT_SECTION=""
          FIX_SECTION=""
          CHORE_SECTION=""
          DOCS_SECTION=""
          OTHER_SECTION=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            hash="${line%% *}"          # first word = short SHA
            subject="${line#* }"        # rest of the line = subject

            link="[\`$hash\`](https://github.com/${GITHUB_REPOSITORY}/commit/$hash): $subject"

            case "$subject" in
              "feat:"*|"feat("*)
                FEAT_SECTION="${FEAT_SECTION}- ${link}\n"
                ;;
              "fix:"*|"fix("*)
                FIX_SECTION="${FIX_SECTION}- ${link}\n"
                ;;
              "chore:"*|"chore("*)
                CHORE_SECTION="${CHORE_SECTION}- ${link}\n"
                ;;
              "docs:"*|"docs("*)
                DOCS_SECTION="${DOCS_SECTION}- ${link}\n"
                ;;
              *)
                OTHER_SECTION="${OTHER_SECTION}- ${link}\n"
                ;;
            esac
          done < commits.txt

          CHANGELOG=""

          if [ -n "$FEAT_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🚀 Features\n${FEAT_SECTION}\n"
          fi
          if [ -n "$FIX_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIX_SECTION}\n"
          fi
          if [ -n "$CHORE_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🧹 Chores & Maintenance\n${CHORE_SECTION}\n"
          fi
          if [ -n "$DOCS_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📝 Documentation\n${DOCS_SECTION}\n"
          fi
          if [ -z "$CHANGELOG" ] && [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          elif [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="(No commits found for this range.)\n"
          fi

          # Write changelog to a file
          printf "%b" "$CHANGELOG" > CHANGELOG_SECTION.md

      - name: Generate release body
        id: body
        run: |
          RAW_TAG="${{ steps.vars.outputs.raw_tag }}"
          VERSION="${{ steps.vars.outputs.version }}"
          MAJOR="${{ steps.vars.outputs.major }}"
          MINOR="${{ steps.vars.outputs.minor }}"
          PATCH="${{ steps.vars.outputs.patch }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          # Header and changelog title
          cat << 'EOF' > RELEASE_BODY.md
          A new version of **yomama-api** is out! 🎉

          ## Changelog

          EOF

          # Append the generated changelog section, if it exists
          if [ -f CHANGELOG_SECTION.md ]; then
            cat CHANGELOG_SECTION.md >> RELEASE_BODY.md
          else
            echo "(No commits found for this range.)" >> RELEASE_BODY.md
          fi

          # Append Docker tags and usage
          cat << 'EOF' >> RELEASE_BODY.md

          ## Docker Tags

          The following Docker tags are available for this release:

          - `ghcr.io/azstrait/yomama-api:vMAJOR`
          - `ghcr.io/azstrait/yomama-api:vMINOR`
          - `ghcr.io/azstrait/yomama-api:vPATCH`
          - `ghcr.io/azstrait/yomama-api:latest`
          - `ghcr.io/azstrait/yomama-api:build-SHORT_SHA`

          See all images at:
          https://github.com/azstrait/yomama-api/pkgs/container/yomama-api

          ## Usage

          See the [README](https://github.com/azstrait/yomama-api/blob/vVERSION/README.md#running-via-docker) for Docker usage:
          EOF

          # Replace placeholders for version info
          sed -i "s/vMAJOR/v${MAJOR}/g" RELEASE_BODY.md
          sed -i "s/vMINOR/v${MINOR}/g" RELEASE_BODY.md
          sed -i "s/vPATCH/v${PATCH}/g" RELEASE_BODY.md
          sed -i "s/SHORT_SHA/${SHORT_SHA}/g" RELEASE_BODY.md
          sed -i "s/vVERSION/v${VERSION}/g" RELEASE_BODY.md

          echo "body_path=RELEASE_BODY.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.raw_tag }}
          name: yomama-api v${{ steps.vars.outputs.version }}
          body_path: ${{ steps.body.outputs.body_path }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            docker-compose.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}