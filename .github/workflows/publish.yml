name: Publish & Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest

      - name: Lint with Black
        run: |
          black --check .

      - name: Run tests
        run: |
          pytest

  docker-publish:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/azstrait/yomama-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract version info from tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3 or 1.2.3
          VERSION="${RAW_TAG#v}"                # strip leading v if present -> 1.2.3

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "raw_tag=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.major }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.minor }}
            ${{ env.IMAGE_NAME }}:v${{ steps.vars.outputs.patch }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:build-${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  create-release:
    runs-on: ubuntu-latest
    needs: docker-publish
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info from tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          ${VERSION}
          EOF

          SHORT_SHA="$(git rev-parse --short "${RAW_TAG}")"

          echo "raw_tag=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "patch=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine previous tag
        id: prev
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          echo "Generating changelog for range:"
          if [ -n "$PREV_TAG" ]; then
            echo "  $PREV_TAG..$CURRENT_TAG"
            RANGE="$PREV_TAG..$CURRENT_TAG"
          else
            echo "  (initial release) up to $CURRENT_TAG"
            RANGE="$CURRENT_TAG"
          fi

          git log --format="%s" $RANGE > commits.txt || true

          FEAT_SECTION=""
          FIX_SECTION=""
          CHORE_SECTION=""
          DOCS_SECTION=""
          OTHER_SECTION=""

          while IFS= read -r line; do
            case "$line" in
              "feat:"*|"feat("*)
                FEAT_SECTION="${FEAT_SECTION}- ${line}\n"
                ;;
              "fix:"*|"fix("*)
                FIX_SECTION="${FIX_SECTION}- ${line}\n"
                ;;
              "chore:"*|"chore("*)
                CHORE_SECTION="${CHORE_SECTION}- ${line}\n"
                ;;
              "docs:"*|"docs("*)
                DOCS_SECTION="${DOCS_SECTION}- ${line}\n"
                ;;
              *)
                OTHER_SECTION="${OTHER_SECTION}- ${line}\n"
                ;;
            esac
          done < commits.txt

          CHANGELOG=""

          if [ -n "$FEAT_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🚀 Features\n${FEAT_SECTION}\n"
          fi
          if [ -n "$FIX_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIX_SECTION}\n"
          fi
          if [ -n "$CHORE_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 🧹 Chores & Maintenance\n${CHORE_SECTION}\n"
          fi
          if [ -n "$DOCS_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📝 Documentation\n${DOCS_SECTION}\n"
          fi
          if [ -z "$CHANGELOG" ] && [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          elif [ -n "$OTHER_SECTION" ]; then
            CHANGELOG="${CHANGELOG}### 📦 Other Changes\n${OTHER_SECTION}\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="(No commits found for this range.)"
          fi

          CHANGELOG_ESCAPED=$(printf "%s" "$CHANGELOG" | sed 's/\\/\\\\/g')

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "$CHANGELOG_ESCAPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          MAJOR="${{ steps.vars.outputs.major }}"
          MINOR="${{ steps.vars.outputs.minor }}"
          PATCH="${{ steps.vars.outputs.patch }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          cat << 'EOF' > RELEASE_BODY.md
          A new version of **yomama-api** is out! 🎉

          ## Changelog

          CHANGELOG_PLACEHOLDER

          ## Docker Tags

          The following Docker tags are available for this release:

          - `ghcr.io/azstrait/yomama-api:vMAJOR`
          - `ghcr.io/azstrait/yomama-api:vMINOR`
          - `ghcr.io/azstrait/yomama-api:vPATCH`
          - `ghcr.io/azstrait/yomama-api:latest`
          - `ghcr.io/azstrait/yomama-api:build-SHORT_SHA`

          ## Usage

          See the README for `docker-compose.yml` examples and environment variables.
          EOF

          sed -i "s/vMAJOR/v${MAJOR}/g" RELEASE_BODY.md
          sed -i "s/vMINOR/v${MINOR}/g" RELEASE_BODY.md
          sed -i "s/vPATCH/v${PATCH}/g" RELEASE_BODY.md
          sed -i "s/SHORT_SHA/${SHORT_SHA}/g" RELEASE_BODY.md

          perl -0pi -e "s/CHANGELOG_PLACEHOLDER/${CHANGELOG//\//\\/}/" RELEASE_BODY.md

          echo "body_path=RELEASE_BODY.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.raw_tag }}
          name: yomama-api v${{ steps.vars.outputs.version }}
          body_path: ${{ steps.body.outputs.body_path }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            docker-compose.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}